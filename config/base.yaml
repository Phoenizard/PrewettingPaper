# 唯一参数源：物理 + 数值 + 判据。逐 case 只覆盖 physical 中的 chi/omega/chibb
# （由 verify_cases.yaml 的 rel 路径解析而来）。取值依据 doc/note/code_cross_comparison.md。

physical:
  L: 10.0
  N: 1000
  kappa_11: 1.0
  kappa_22: 1.0
  kappa_12: 0.0
  n1: 1.0
  n2: 1.0
  n3: 1.0
  chi_12: 0.0
  chi_13: 2.8
  chi_23: 2.6
  omega_1: -0.50
  omega_2: -0.30
  chi_bb_11: 0.0
  chi_bb_22: 0.0
  chi_bb_12: 0.0

solver:
  tol: 1.0e-8
  max_iter: 500
  min_alpha: 1.0e-3

scan:
  phi_min: 0.0001
  phi_max: 0.2
  n_scan: 400        # 每条迟滞线上的扫描点数
  n_lines: 400       # 固定值方向的扫描线数
  amp_phi1_thin: 0.015
  amp_phi2_thin: 0.004
  amp_phi1_thick: 0.3
  amp_phi2_thick: 0.3

criterion:
  cs_threshold: 0.1
  min_hysteresis_points: 2

bulk:
  demixed_grid: 451
  demix_tol: 1.0e-5
  binodal_grid: 801
  k_nearest: 8
  vote_ratio: 0.5
